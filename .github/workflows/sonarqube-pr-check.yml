name: SonarQube PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

jobs:
  sonarqube-scan:
    name: SonarQube PR Quality Gate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        id: sonar
        uses: SonarSource/sonarqube-scan-action@v7
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Generate SonarQube PR Report
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          SONAR_PROJECT_KEY=$(grep -E '^sonar.projectKey=' sonar-project.properties | cut -d'=' -f2-)

          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "Could not find sonar.projectKey in sonar-project.properties"
            exit 1
          fi

          echo "Using Sonar project key: $SONAR_PROJECT_KEY"

          curl -s \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_HOST_URL/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&pullRequest=$PR_NUMBER&resolved=false&ps=100" \
            > sonar-issues.json

          TOTAL=$(jq '.total' sonar-issues.json)

          cat > sonar-report.md <<EOF
          ## SonarQube PR Report

          **Quality Gate:** ${{ steps.sonar.outcome == 'success' && 'Passed' || 'Failed' }}

          **New/Open PR issues found:** $TOTAL

          EOF

          if [ "$TOTAL" -eq 0 ]; then
            echo "No new SonarQube issues found in this PR." >> sonar-report.md
          else
            jq -r '
              .issues[]
              | "### \(.type) - \(.severity)\n"
              + "**File:** `\(.component | split(":")[-1])`\n\n"
              + "**Line:** \(.line // "N/A")\n\n"
              + "**Rule:** `\(.rule)`\n\n"
              + "**Message:** \(.message)\n"
            ' sonar-issues.json >> sonar-report.md
          fi

      - name: Post SonarQube report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('sonar-report.md', 'utf8');
            const marker = '<!-- sonar-pr-report -->';
            const finalBody = `${marker}\n${body}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existingComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: finalBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: finalBody
              });
            }

      - name: Fail workflow if SonarQube Quality Gate failed
        if: steps.sonar.outcome == 'failure'
        run: exit 1
