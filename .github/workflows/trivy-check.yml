name: Trivy PR Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Trivy config scan for Dockerfile and IaC
        id: trivy_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-config-report.txt

      - name: Show Trivy config scan report
        if: always()
        run: |
          echo "Trivy Config/Misconfiguration Report"
          cat trivy-config-report.txt || true
          
      - name: Show PR changes before Docker build
        run: |
          echo "Files changed in this PR:"
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

          echo ""
          echo "Changes inside api folder:"
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep '^api/' || echo "No api folder changes found"

      - name: Build Docker image for Trivy image scan
        run: |
          docker build -f ./api/dockerfile -t upload-api:${{ github.sha }} ./api

      - name: Trivy image scan for OS and library vulnerabilities
        id: trivy_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: upload-api:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: 1
          output: trivy-image-report.txt

      - name: Show Trivy image scan report
        if: always()
        run: |
          echo "Trivy Image Vulnerability Report"
          cat trivy-image-report.txt || true

      - name: Generate Trivy PR comment report
        if: always()
        run: |
          {
            echo "## Trivy PR Security Scan Report"
            echo ""
            echo "**Config/IaC scan status:** ${{ steps.trivy_config.outcome == 'success' && 'Passed' || 'Failed' }}"
            echo ""
            echo "**Image OS/library scan status:** ${{ steps.trivy_image.outcome == 'success' && 'Passed' || 'Failed' }}"
            echo ""
            echo "---"
            echo ""
            echo "## Dockerfile / IaC Misconfiguration Report"
            echo ""
            echo "<details>"
            echo "<summary>Click to expand Trivy config scan report</summary>"
            echo ""
            echo '```text'
            cat trivy-config-report.txt || echo "No config report found."
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "---"
            echo ""
            echo "## Image OS / Library Vulnerability Report"
            echo ""
            echo "<details>"
            echo "<summary>Click to expand Trivy image scan report</summary>"
            echo ""
            echo '```text'
            cat trivy-image-report.txt || echo "No image report found."
            echo '```'
            echo ""
            echo "</details>"
          } > trivy-pr-report.md

          cat trivy-pr-report.md

      - name: Post Trivy report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('trivy-pr-report.md', 'utf8');
            const marker = '<!-- trivy-pr-report -->';
            const finalBody = `${marker}\n${body}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existingComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: finalBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: finalBody
              });
            }

      - name: Fail workflow if Trivy config scan failed
        if: steps.trivy_config.outcome == 'failure'
        run: |
          echo "Trivy config scan found HIGH or CRITICAL misconfigurations."
          exit 1

      - name: Fail workflow if Trivy image scan failed
        if: steps.trivy_image.outcome == 'failure'
        run: |
          echo "Trivy image scan found HIGH or CRITICAL OS/library vulnerabilities."
          exit 1