name: RUn ON 'run_sonarqube'  COMMENT

on:
  issue_comment:
    types: [created]

jobs:
  reject-unauthorized-user:
    name: Reject unauthorized production trigger
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login != 'joyboy2701' ||
      github.event.comment.user.login != 'RameezAhmedZaka' &&
      github.event.comment.body == 'run_sonarqube'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post unauthorized trigger message
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, you are not allowed to trigger the production pipeline.`
            });

  approval_gate:
    name: Verify required PR approval
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'joyboy2701' || github.event.comment.user.login == 'RameezAhmedZaka' &&
      github.event.comment.body == 'run_sonarqube'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    outputs:
      approved: ${{ steps.review-decision.outputs.approved }}

    steps:
      - name: Check PR review decision
        id: review-decision
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `, {
              ...context.repo,
              number: context.issue.number
            });

            const decision = result.repository.pullRequest.reviewDecision;
            core.info(`PR review decision: ${decision ?? 'REVIEW_REQUIRED'}`);
            core.setOutput('approved', decision === 'APPROVED' ? 'true' : 'false');

      - name: Post missing approval message
        if: steps.review-decision.outputs.approved != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, the production pipeline was not triggered because at least one required code-owner approval is missing.`
            });

  build-and-push:
    name: Test Pipeline Completion
    needs: approval_gate

    if: >-
      needs.approval_gate.outputs.approved == 'true'

    runs-on: ubuntu-latest

    steps:
    - name: Complete test job
      run: |
        echo "Approval verified."
        echo "Test pipeline completed successfully."
