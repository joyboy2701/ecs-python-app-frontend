name: Build & Push Docker Images to ECR

on:
  issue_comment:
    types: [created]

jobs:
  build-and-push:
    name: Build, Push and Deploy
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'joyboy2701' &&
      github.event.comment.body == 'run_sonarqube'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push API image
        run: |
          docker build -t upload-api:latest ./api
          docker tag upload-api:latest ${{ secrets.ECR_REGISTRY }}/upload-api:latest
          docker push ${{ secrets.ECR_REGISTRY }}/upload-api:latest

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster ${{ vars.CLUSTER }} \
            --service ${{ vars.SERVICE }} \
            --force-new-deployment \
            --region ${{ secrets.REGION }}
