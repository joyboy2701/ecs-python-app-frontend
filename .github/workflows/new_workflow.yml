name: RUn ON 'run_sonarqube'  COMMENT

on:
  issue_comment:
    types: [created]

jobs:
  reject-unauthorized-user:
    name: Reject unauthorized production trigger
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login != 'joyboy2701' &&
      github.event.comment.body == 'run_sonarqube'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Post unauthorized trigger message
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, you are not allowed to trigger the production pipeline.`
            });

  approval_gate:
    name: Verify required PR approval
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'joyboy2701' &&
      github.event.comment.body == 'run_sonarqube'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read
      issues: write

    outputs:
      approved: ${{ steps.review-decision.outputs.approved }}

    steps:
      - name: Check PR review decision
        id: review-decision
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `, {
              ...context.repo,
              number: context.issue.number
            });

            const decision = result.repository.pullRequest.reviewDecision;
            core.info(`PR review decision: ${decision ?? 'REVIEW_REQUIRED'}`);
            core.setOutput('approved', decision === 'APPROVED' ? 'true' : 'false');

      - name: Explain missing approval
        if: steps.review-decision.outputs.approved != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, the production pipeline was not started because this PR does not have the required code-owner approval.`
            });

  build-and-push:
    name: Build, Push and Deploy
    needs: approval_gate
    if: >-
      needs.approval_gate.outputs.approved == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push API image
        run: |
          docker build -t upload-api:latest ./api
          docker tag upload-api:latest ${{ secrets.ECR_REGISTRY }}/upload-api:latest
          docker push ${{ secrets.ECR_REGISTRY }}/upload-api:latest

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster ${{ vars.CLUSTER }} \
            --service ${{ vars.SERVICE }} \
            --force-new-deployment \
            --region ${{ secrets.REGION }}
