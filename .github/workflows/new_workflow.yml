name: New Workflow

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  authorize-user:
    name: Verify authorized user
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == 'run_sonarqube'

    runs-on: ubuntu-latest

    outputs:
      authorized: ${{ steps.check-user.outputs.authorized }}

    steps:
      - name: Check trigger user
        id: check-user
        env:
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          if [ "$COMMENT_USER" = "joyboy2701" ]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when user is unauthorized
        if: steps.check-user.outputs.authorized != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, you are not allowed to trigger this pipeline.`
            });

  approval-gate:
    name: Verify required PR approval
    needs: authorize-user
    if: needs.authorize-user.outputs.authorized == 'true'

    runs-on: ubuntu-latest

    outputs:
      approved: ${{ steps.review-check.outputs.approved }}

    steps:
      - name: Check PR review decision
        id: review-check
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `, {
              ...context.repo,
              number: context.issue.number
            });

            const decision =
              result.repository.pullRequest.reviewDecision;

            core.info(`PR review decision: ${decision ?? 'REVIEW_REQUIRED'}`);

            core.setOutput(
              'approved',
              decision === 'APPROVED' ? 'true' : 'false'
            );

      - name: Comment when review is required
        if: steps.review-check.outputs.approved != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, the pipeline was not triggered because the required PR approval is missing.`
            });

  build-and-push:
    name: Build, Push and Deploy
    needs: approval-gate
    if: needs.approval-gate.outputs.approved == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Complete test job
        run: |
          echo "Authorization verified."
          echo "Required PR approval verified."
          echo "Job completed successfully."
