name: Run on 'run_sonarqube' comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  authorize-user:
    name: Check CODEOWNERS authorization

    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == 'run_sonarqube'

    runs-on: ubuntu-latest

    outputs:
      authorized: ${{ steps.authorization.outputs.authorized }}

    steps:
      - name: Check whether commenter is a CODEOWNER
        id: authorization
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login.toLowerCase();
            const pullNumber = context.issue.number;

            // Get the PR so we can determine its trusted base branch.
            const { data: pullRequest } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: pullNumber
            });

            const baseRef = pullRequest.base.ref;

            core.info(`Checking CODEOWNERS from base branch: ${baseRef}`);
            core.info(`Comment author: ${commenter}`);

            // GitHub searches these CODEOWNERS locations in this order.
            const possiblePaths = [
              '.github/CODEOWNERS',
              'CODEOWNERS',
              'docs/CODEOWNERS'
            ];

            let codeownersContent = null;
            let codeownersPath = null;

            for (const path of possiblePaths) {
              try {
                const { data } = await github.rest.repos.getContent({
                  ...context.repo,
                  path,
                  ref: baseRef
                });

                if (Array.isArray(data) || !data.content) {
                  continue;
                }

                codeownersContent = Buffer.from(
                  data.content,
                  data.encoding
                ).toString('utf8');

                codeownersPath = path;
                break;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (!codeownersContent) {
              core.warning(
                `No CODEOWNERS file found on base branch ${baseRef}.`
              );

              core.setOutput('authorized', 'false');
              return;
            }

            core.info(`Using CODEOWNERS file: ${codeownersPath}`);

            const allowedUsers = new Set();

            for (const rawLine of codeownersContent.split(/\r?\n/)) {
              // Remove comments and surrounding whitespace.
              const line = rawLine.split('#')[0].trim();

              if (!line) {
                continue;
              }

              // First value is the path pattern. Remaining values are owners.
              const entries = line.split(/\s+/);
              const owners = entries.slice(1);

              for (const owner of owners) {
                /*
                 * Include individual GitHub usernames such as:
                 * @joyboy2701
                 *
                 * Ignore:
                 * @organization/team-name
                 * email@example.com
                 */
                if (
                  owner.startsWith('@') &&
                  !owner.includes('/')
                ) {
                  allowedUsers.add(
                    owner.substring(1).toLowerCase()
                  );
                }
              }
            }

            core.info(
              `Individual CODEOWNERS: ${[...allowedUsers].join(', ') || 'none'}`
            );

            const authorized = allowedUsers.has(commenter);

            core.setOutput(
              'authorized',
              authorized ? 'true' : 'false'
            );

            if (authorized) {
              core.info(`${commenter} is authorized.`);
            } else {
              core.warning(`${commenter} is not an individual CODEOWNER.`);
            }

      - name: Post unauthorized trigger message
        if: steps.authorization.outputs.authorized != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, you are not authorized to trigger this pipeline because your GitHub username is not listed as an individual owner in the CODEOWNERS file.`
            });

  approval_gate:
    name: Verify required PR approval
    needs: authorize-user

    if: needs.authorize-user.outputs.authorized == 'true'

    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: read

    outputs:
      approved: ${{ steps.review-decision.outputs.approved }}

    steps:
      - name: Check PR review decision
        id: review-decision
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `, {
              ...context.repo,
              number: context.issue.number
            });

            const decision =
              result.repository.pullRequest.reviewDecision;

            core.info(
              `PR review decision: ${decision ?? 'REVIEW_REQUIRED'}`
            );

            core.setOutput(
              'approved',
              decision === 'APPROVED' ? 'true' : 'false'
            );

      - name: Post missing approval message
        if: steps.review-decision.outputs.approved != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, the pipeline was not triggered because at least one required code-owner approval is missing.`
            });

  build-and-push:
    name: Test Pipeline Completion
    needs: approval_gate

    if: needs.approval_gate.outputs.approved == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Complete test job
        run: |
          echo "CODEOWNERS authorization verified."
          echo "Required approval verified."
          echo "Test pipeline completed successfully."