name: New Workflow

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  authorize-user:
    name: Verify CODEOWNERS authorization

    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == 'run_sonarqube'

    runs-on: ubuntu-latest

    outputs:
      authorized: ${{ steps.check-codeowners.outputs.authorized }}

    steps:
      - name: Check user against CODEOWNER
        id: check-codeowners
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commenter =
              context.payload.comment.user.login.toLowerCase();

            const pullNumber = context.issue.number;

            /*
             * Retrieve the PR so CODEOWNERS can be read from the trusted
             * base commit rather than from the contributor's PR branch.
             */
            const { data: pullRequest } =
              await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber
              });

            const baseOwner =
              pullRequest.base.repo.owner.login;

            const baseRepo =
              pullRequest.base.repo.name;

            const baseRef =
              pullRequest.base.ref;

            core.info(
              `Checking ${commenter} against CODEOWNERS from ` +
              `${baseOwner}/${baseRepo}@${baseRef}`
            );

            /*
             * GitHub checks these CODEOWNERS locations in this order.
             */
            const possiblePaths = [
              '.github/CODEOWNERS',
              'CODEOWNERS',
              'docs/CODEOWNERS'
            ];

            let codeownersContent = null;
            let codeownersPath = null;

            for (const path of possiblePaths) {
              try {
                const { data } =
                  await github.rest.repos.getContent({
                    owner: baseOwner,
                    repo: baseRepo,
                    path,
                    ref: baseRef
                  });

                if (Array.isArray(data) || !data.content) {
                  continue;
                }

                codeownersContent = Buffer.from(
                  data.content.replace(/\n/g, ''),
                  'base64'
                ).toString('utf8');

                codeownersPath = path;
                break;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            if (!codeownersContent) {
              core.warning(
                'No CODEOWNERS file was found in .github/, root, or docs/.'
              );

              core.setOutput('authorized', 'false');
              return;
            }

            core.info(`Using CODEOWNERS file: ${codeownersPath}`);

            const allowedUsers = new Set();

            for (const rawLine of codeownersContent.split(/\r?\n/)) {
              /*
               * Remove comments. The first field is the path pattern;
               * remaining fields are owners.
               */
              const line = rawLine.split('#')[0].trim();

              if (!line) {
                continue;
              }

              const entries = line.split(/\s+/);
              const owners = entries.slice(1);

              for (const owner of owners) {
                /*
                 * Accept individual usernames such as @joyboy2701.
                 * Team references such as @company/devops are ignored.
                 */
                if (
                  owner.startsWith('@') &&
                  !owner.includes('/')
                ) {
                  allowedUsers.add(
                    owner.substring(1).toLowerCase()
                  );
                }
              }
            }

            core.info(
              `Allowed CODEOWNERS users: ${
                [...allowedUsers].join(', ') || 'none'
              }`
            );

            const authorized =
              allowedUsers.has(commenter);

            core.setOutput(
              'authorized',
              authorized ? 'true' : 'false'
            );

            if (authorized) {
              core.info(
                `${commenter} is authorized to trigger the pipeline.`
              );
            } else {
              core.warning(
                `${commenter} is not listed as an individual CODEOWNER.`
              );
            }

      - name: Comment when user is unauthorized
        if: steps.check-codeowners.outputs.authorized != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, you are not allowed to trigger this pipeline because your username is not listed in the CODEOWNERS file.`
            });

  approval-gate:
    name: Verify required PR approval

    needs: authorize-user
    if: needs.authorize-user.outputs.authorized == 'true'

    runs-on: ubuntu-latest

    outputs:
      approved: ${{ steps.review-check.outputs.approved }}

    steps:
      - name: Check PR review decision
        id: review-check
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewDecision
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.issue.number
            });

            const decision =
              result.repository.pullRequest.reviewDecision;

            core.info(
              `PR review decision: ${decision ?? 'REVIEW_REQUIRED'}`
            );

            core.setOutput(
              'approved',
              decision === 'APPROVED' ? 'true' : 'false'
            );

      - name: Comment when review is required
        if: steps.review-check.outputs.approved != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login}, the pipeline was not triggered because the required PR approval is missing.`
            });

  build-and-push:
    name: Test Pipeline Completion

    needs: approval-gate
    if: needs.approval-gate.outputs.approved == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Complete test job
        run: |
          echo "CODEOWNERS authorization verified."
          echo "Required PR approval verified."
          echo "Job completed successfully."